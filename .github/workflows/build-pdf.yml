name: Build and Publish PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full

      - name: Build PDF
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error main.tex

      - name: Prepare Pages content
        run: |
          mkdir public
          cp main.pdf public/main.pdf

          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Digital Sovereignty Manual – Level 1</title>
            <meta name="description" content="Step-by-step manual to build a digital sovereignty environment on a server: private cloud, Docker stack, local AI, backups, restore procedures, and troubleshooting.">
            <meta name="robots" content="index, follow">
            <link rel="canonical" href="https://mattispin.github.io/digital-sovereignty-manual/">
          </head>
          <body>
            <h1>Digital Sovereignty Manual – Level 1</h1>

            <p>
              A practical step-by-step manual for building a digital sovereignty environment
              on a server, including private cloud services, Docker-based deployment,
              local AI tools, backup and restore workflows, and troubleshooting.
            </p>

            <p>
              Topics include self-hosting, digital sovereignty, Docker, private cloud,
              local AI, Ollama, Open WebUI, backups, restoration, and server administration.
            </p>

            <p>
              <a href="main.pdf">Open or download the PDF manual</a>
            </p>
          </body>
          </html>
          EOF

          cat > public/robots.txt <<'EOF'
          User-agent: *
          Allow: /

          Sitemap: https://mattispin.github.io/digital-sovereignty-manual/sitemap.xml
          EOF

          cat > public/sitemap.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://mattispin.github.io/digital-sovereignty-manual/</loc>
            </url>
            <url>
              <loc>https://mattispin.github.io/digital-sovereignty-manual/main.pdf</loc>
            </url>
          </urlset>
          EOF

      - name: Upload PDF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: digital-sovereignty-pdf
          path: main.pdf

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Upload LaTeX log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-log
          path: main.log

  deploy:
    needs: build-pdf
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4