name: Build and Publish PDF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full

      - name: Build PDF
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error main.tex

      - name: Prepare Pages content
        run: |
          mkdir public
          cp main.pdf public/main.pdf
          printf '<!doctype html><html><head><meta http-equiv="refresh" content="0; url=main.pdf"></head><body><a href="main.pdf">Open PDF</a></body></html>' > public/index.html

      - name: Upload PDF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: digital-sovereignty-pdf
          path: main.pdf

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Upload LaTeX log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-log
          path: main.log

  deploy:
    needs: build-pdf
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4